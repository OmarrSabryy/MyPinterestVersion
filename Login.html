<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Pinterest</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='login.css'>
    <script src='main.js'></script>
</head>
<body>
    <header class="group">
        <figure>
            <img src="images/How to Use Pinterest.jpg" alt="logo"><h1>Pinterest</h1>
        </figure>
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Business</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Login</a></li>
                <li><a href="#">Sign up</a></li>
            </ul>
        </nav>
        <!-- <div class="fix"></div> -->
    </header>
    <div class="modal">
        <h1>Welcome to Pinterest</h1>
        <h4>Find new ideas to try</h4>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Create a password">
        <input type="number" placeholder="Age">
        <button type="submit" name="submit">Continue</button>
        <h2>OR</h2>
        <div class="Fb" >
            <img src="images/facebookIcon.png" alt=""><h3>Continue with Facebook</h3>
        </div>
        <div class="Gm" >
            <img src="images/googleIcon.png" alt=""><h3>Continue with Gmail</h3>
        </div>
        
    </div>
</body>

</html>
